name: Terraform apply

on:
    workflow_dispatch:

#  push:
#    paths:
#      - "terraform/**"

jobs:
    terraform:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: hashicorp/setup-terraform@v3

            - name: Terraform Init
              working-directory: terraform
              run: terraform init

            - name: Terraform apply
              working-directory: terraform
              run: terraform apply -auto-approve